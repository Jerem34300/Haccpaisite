<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HACC.PRO</title>
<meta name="robots" content="noindex">
<script>
(function(){
  try {
    var s1 = JSON.parse(localStorage.getItem('haccpro_session')||'{}');
    var s2 = JSON.parse(localStorage.getItem('haccpro_supa_cfg')||'{}');
    var DASH = ['super_admin','siege','directeur','chef_secteur'];
    var PMS  = ['cuisinier'];
    if(s1.token && s1.role){
      if(DASH.includes(s1.role)) { window.location.replace('dashboard.html'); return; }
      if(PMS.includes(s1.role))  { window.location.replace('cuisine.html');   return; }
    }
    if(s2.userToken && s2.userRole==='cuisinier'){
      window.location.replace('cuisine.html'); return;
    }
  } catch(e){}
  window.location.replace('landing.html');
})();
</script>
</head>
<body></body>
</html>
